name: CI Build and Push

on:
  push:
    branches:
      - main
      - master
      - conteneursDocker
  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-and-push-frontends:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [frontend-app, frontend-backoffice]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd ${{ matrix.app }}
          npm ci

      - name: Build app
        run: |
          cd ${{ matrix.app }}
          npm run build -- --configuration production

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.app }}
          file: ${{ matrix.app }}/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/medicalsplants-${{ matrix.app }}:${{ github.sha }}
          metadata: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  build-and-push-backend:
    runs-on: ubuntu-latest
    needs: build-and-push-frontends
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Maven
        run: |
          cd backend
          mvn -B -DskipTests package

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/medicalsplants-backend:${{ github.sha }}
          metadata: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
