# ============================================================
# DOCKER COMPOSE - DEVELOPMENT ENVIRONMENT
# ============================================================
# Usage: docker-compose -f docker-compose.yml up -d

version: '3.8'

services:
  # ========================================
  # PostgreSQL Database
  # ========================================
  db: 
    image: postgres:16-alpine
    container_name: medicalsplants-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment: 
      POSTGRES_DB: medicalsplants_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medicalsplants-network

  # ========================================
  # Adminer - Database Management UI
  # ========================================
  adminer:
    image: adminer:latest
    container_name: medicalsplants-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on: 
      db:
        condition: service_healthy
    networks:
      - medicalsplants-network

  # ========================================
  # MailHog - Email Testing
  # ========================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: medicalsplants-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - medicalsplants-network

  # ========================================
  # Backend
  # ========================================
  backend:
    image: medicalsplants-backend:latest
    container_name: medicalsplants-backend-dev
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - medicalsplants-network
    env_file:
      - .env

  # ========================================
  # Frontend - Public App (Angular)
  # ========================================
  frontend-app:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
    container_name: medicalsplants-frontend-app
    restart: unless-stopped
    ports:
      - "4200:4200"
    depends_on:
      - backend
    networks:
      - medicalsplants-network

  # ========================================
  # Frontend - Backoffice (Angular)
  # ========================================
  frontend-backoffice:
    build:
      context: ./frontend-backoffice
      dockerfile: Dockerfile
    container_name: medicalsplants-frontend-backoffice
    restart: unless-stopped
    ports:
      - "4201:4201"
    depends_on:
      - backend
    networks:
      - medicalsplants-network

volumes:
  postgres_data:
    name: medicalsplants-postgres-data

networks:
  medicalsplants-network:
    name: medicalsplants-dev
    driver: bridge
