<header class="header">
  <div class="header__container">
    <!-- Logo -->
    <a routerLink="/" class="header__logo" (click)="closeMenu()">
      <span class="header__logo-icon">🌿</span>
      <span class="header__logo-text">Medicals Plants</span>
    </a>

    <!-- Navigation Desktop -->
    <nav class="header__nav" [class.header__nav--open]="isMenuOpen">
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="header__link"
        (click)="closeMenu()"
      >
        Accueil
      </a>
      <a
        routerLink="/symptoms"
        routerLinkActive="active"
        class="header__link"
        (click)="closeMenu()"
      >
        Symptômes
      </a>
      <a routerLink="/plants" routerLinkActive="active" class="header__link" (click)="closeMenu()">
        Plantes
      </a>
      <a
        routerLink="/receipts"
        routerLinkActive="active"
        class="header__link"
        (click)="closeMenu()"
      >
        Recettes
      </a>

      <!-- User Menu -->
      <div class="header__user">
        @if (authService.isAuthenticated()) {
        <div class="header__user-menu">
          <a routerLink="/profile" class="header__link header__link--user" (click)="closeMenu()">
            <span class="header__avatar">
              {{ authService.currentUser()?.pseudo?.charAt(0)?.toUpperCase() }}
            </span>
            <span>{{ authService.currentUser()?.pseudo }}</span>
          </a>
          @if (authService. isPremium()) {
          <span class="header__badge header__badge--premium">Premium</span>
          }
          <button class="header__btn header__btn--logout" (click)="logout()">Déconnexion</button>
        </div>
        } @else {
        <a routerLink="/login" class="header__btn header__btn--login" (click)="closeMenu()">
          Connexion
        </a>
        <a routerLink="/register" class="header__btn header__btn--register" (click)="closeMenu()">
          Inscription
        </a>
        }
      </div>
    </nav>

    <!-- Mobile Menu Toggle -->
    <button class="header__toggle" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen">
      <span class="header__toggle-bar"></span>
      <span class="header__toggle-bar"></span>
      <span class="header__toggle-bar"></span>
    </button>
  </div>
</header>
