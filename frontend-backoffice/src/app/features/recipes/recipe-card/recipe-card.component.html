<div class="recipe-card">
  <div class="recipe-card-header">
    <h3>{{ recipe.title }}</h3>
    <span
      class="status"
      [style.background]="getStatusColor(recipe.status)"
      [title]="getStatusLabel(recipe.status)"
    >
      {{ getStatusLabel(recipe.status) }}
    </span>
  </div>

  <div class="recipe-card-body">
    <img
      *ngIf="recipe.imageUrl"
      [src]="recipe.imageUrl"
      alt="Image de la recette"
      class="recipe-image"
    />
    <p *ngIf="recipe.description">{{ recipe.description }}</p>
    <div class="recipe-details">
      <span *ngIf="recipe.premium" class="premium">Premium</span>
      <span *ngIf="recipe.author">Auteur : {{ recipe.author.pseudo }}</span>
      <span>Date de création : {{ recipe.createdAt | date: 'mediumDate' }}</span>
    </div>
    <div *ngIf="recipe.plants?.length">
      <strong>Plantes associées :</strong>
      <ul>
        <li *ngFor="let plant of recipe.plants">{{ plant.title }}</li>
      </ul>
    </div>
  </div>
</div>
