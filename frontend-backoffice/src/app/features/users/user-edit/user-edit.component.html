<div class="page">
  <!-- Header -->
  <div class="page__header">
    <a routerLink="/users" class="page__back">← Retour aux utilisateurs</a>
    <h1 class="page__title">✏️ Modifier l'utilisateur</h1>
  </div>

  @if (isLoading) {
  <app-loader message="Chargement... "></app-loader>
  } @else if (user) {
  <div class="form-container">
    <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="admin-form">
      <!-- User Info Header -->
      <div class="user-header">
        <div class="user-header__avatar">
          {{ user.pseudo.charAt(0).toUpperCase() }}
        </div>
        <div class="user-header__info">
          <h2 class="user-header__name">{{ user.pseudo }}</h2>
          <p class="user-header__email">{{ user.email }}</p>
        </div>
      </div>

      <!-- Form Fields -->
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Pseudo *</label>
          <input type="text" formControlName="pseudo" class="form-input" />
        </div>

        <div class="form-group">
          <label class="form-label">Prénom</label>
          <input type="text" formControlName="firstname" class="form-input" />
        </div>

        <div class="form-group">
          <label class="form-label">Nom</label>
          <input type="text" formControlName="lastname" class="form-input" />
        </div>

        <div class="form-group">
          <label class="form-label">Téléphone</label>
          <input type="text" formControlName="phone" class="form-input" />
        </div>

        <div class="form-group">
          <label class="form-label">Rôle *</label>
          <select formControlName="role" class="form-select">
            <option value="USER">Utilisateur</option>
            <option value="PREMIUM">Premium</option>
            <option value="ADMIN">Administrateur</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Statut *</label>
          <select formControlName="status" class="form-select">
            <option value="ACTIVE">Actif</option>
            <option value="INACTIVE">Inactif</option>
            <option value="BLOCKED">Bloqué</option>
          </select>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <a routerLink="/users" class="btn btn--secondary">Annuler</a>
        <button type="submit" class="btn btn--primary" [disabled]="isSaving">
          @if (isSaving) { Enregistrement... } @else { Enregistrer }
        </button>
      </div>
    </form>
  </div>
  }
</div>
