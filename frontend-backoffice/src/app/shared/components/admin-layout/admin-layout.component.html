<div class="admin-shell">

  <!-- Mobile overlay -->
  @if (mobileMenuOpen()) {
  <div class="sidebar-overlay" (click)="closeMobileMenu()"></div>
  }

  <!-- ======== SIDEBAR ======== -->
  <aside class="sidebar" [class.sidebar--open]="mobileMenuOpen()">

    <!-- Brand -->
    <div class="sidebar__brand">
      <img src="assets/logo.svg" alt="MedPlants" class="sidebar__logo" />
      <span class="sidebar__brand-name">MedPlants</span>
    </div>

    <!-- Navigation -->
    <nav class="sidebar__nav" aria-label="Navigation principale">
      @for (group of navGroups; track group.label) {
      <div class="sidebar__group">
        <span class="sidebar__group-label">{{ group.label }}</span>
        @for (item of group.items; track item.path) {
        <a
          [routerLink]="[item.path]"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
          class="sidebar__link"
          (click)="closeMobileMenu()"
        >
          <i class="bi {{ item.icon }} sidebar__link-icon" aria-hidden="true"></i>
          <span>{{ item.label }}</span>
        </a>
        }
      </div>
      }
    </nav>

    <!-- User footer -->
    <div class="sidebar__footer">
      <div class="sidebar__avatar" aria-hidden="true">{{ userInitial }}</div>
      <div class="sidebar__user-info">
        <span class="sidebar__user-name">{{ userPseudo }}</span>
        <span class="sidebar__user-role">Administrateur</span>
      </div>
      <button class="sidebar__logout" (click)="logout()" aria-label="Se déconnecter" title="Déconnexion">
        <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
      </button>
    </div>
  </aside>

  <!-- ======== MAIN WRAPPER ======== -->
  <div class="main-wrapper" [class.main-wrapper--expanded]="!sidebarOpen()">

    <!-- Top bar -->
    <header class="topbar" role="banner">
      <div class="topbar__left">
        <button class="topbar__toggle" (click)="openMobileMenu()" aria-label="Ouvrir le menu">
          <i class="bi bi-list" aria-hidden="true"></i>
        </button>
        <h1 class="topbar__title">{{ pageTitle() }}</h1>
      </div>

      <div class="topbar__right">
        <div class="topbar__search" role="search">
          <i class="bi bi-search" aria-hidden="true"></i>
          <input type="search" placeholder="Rechercher..." aria-label="Rechercher" />
        </div>
        <div class="topbar__avatar" aria-hidden="true">{{ userInitial }}</div>
      </div>
    </header>

    <!-- Page content -->
    <main class="content" role="main">
      <router-outlet />
    </main>
  </div>

</div>
