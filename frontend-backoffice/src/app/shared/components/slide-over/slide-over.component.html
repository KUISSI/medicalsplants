@if (isOpen) {
  <div class="so-backdrop" (click)="onBackdropClick()" aria-hidden="true"></div>

  <aside class="so-panel" role="dialog" [attr.aria-label]="title" aria-modal="true">
    <div class="so-header">
      <div class="so-header__text">
        <h2 class="so-title">{{ title }}</h2>
        @if (subtitle) {
          <p class="so-subtitle">{{ subtitle }}</p>
        }
      </div>
      <button class="so-close" (click)="closed.emit()" aria-label="Fermer le panneau">
        <i class="bi bi-x-lg" aria-hidden="true"></i>
      </button>
    </div>

    <div class="so-body">
      <ng-content />
    </div>
  </aside>
}
