# ============================================================
# TEST PROFILE - Testcontainers PostgreSQL
# ============================================================

# DataSource configurée automatiquement par Testcontainers via @ServiceConnection
# Pas besoin de définir url/username/password ici

# JPA pour PostgreSQL (même dialecte qu'en production)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Flyway désactivé pour les tests (on utilise JPA ddl-auto)
spring.flyway.enabled=false

# Allow bean overriding
spring.main.allow-bean-definition-overriding=true

# JWT pour les tests
app.jwt.secret=testSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLongForTesting123456789
app.jwt.expiration=900000
app.jwt.refresh-expiration=604800000

# Logging
logging.level.root=WARN
logging.level.com.medicalsplants=DEBUG
logging.level.org.testcontainers=INFO
logging.level.tc=INFO