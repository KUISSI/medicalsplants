# ============================================================
# TEST PROFILE - Testcontainers PostgreSQL
# ============================================================
# DataSource configurée automatiquement par Testcontainers via @ServiceConnection

spring:
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  main:
    allow-bean-definition-overriding: true

app:
  jwt:
    secret: testSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLongForTesting123456789
    expiration: 900000
    refresh-expiration: 604800000

logging:
  level:
    root: WARN
    "[com.medicalsplants]": DEBUG
    "[org.testcontainers]": INFO
    tc: INFO
