# ============================================================
# APPLICATION PROPERTIES - MEDICALS PLANTS API
# ============================================================
# IMPORTANT: Ne jamais mettre de credentials ou de secrets en clair dans ce fichier.
# Toutes les valeurs sensibles doivent être injectées via des variables d'environnement ou un fichier .env non versionné.
# ============================================================

# APPLICATION
spring.application.name=medicalsplants-api

# FRONTEND URL
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

# SERVER
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always

# DATABASE - PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:medicalsplants_dev}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# CONNECTION POOL - HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000

# JPA / HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# EMAIL - SMTP
spring.mail.host=${MAIL_HOST:smtp.sendgrid.net}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true
APP_MAIL_FROM=${MAIL_FROM}

# CUSTOM APPLICATION PROPERTIES
app.name=${APP_NAME:Medicals Plants}
app.url=${APP_URL: http://localhost:8080}

# JWT CONFIGURATION
app.jwt.secret=${JWT_SECRET:myDevSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong123456789}
app.jwt.expiration=${JWT_EXPIRATION:900000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
app.jwt.token-prefix=Bearer 
app.jwt.header-name=Authorization

# CORS CONFIGURATION
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:4201}
app.cors.max-age=3600

# ACTUATOR / MONITORING
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# OPENAPI / SWAGGER
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# LOGGING
logging.level.root=INFO
logging.level.com.medicalsplants=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm: ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# Les variables ci-dessous doivent être définies dans l'environnement ou dans un fichier .env, pas ici.
# Jamais de credentials ou de secrets en clair dans ce fichier !
# ============================================================