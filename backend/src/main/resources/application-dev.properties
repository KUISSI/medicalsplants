# ============================================================
# JWT CONFIGURATION
# ============================================================
app.jwt.secret=${JWT_SECRET:myDevSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong123456789}
# JWT CONFIGURATION
# En développement, une valeur par défaut forte est utilisée.
# En production, il faut OBLIGATOIREMENT définir JWT_SECRET dans l'environnement.
#
# Exemple (Windows) : set JWT_SECRET=unePhraseSecrèteComplexe
# Exemple (Linux/Mac) : export JWT_SECRET=unePhraseSecrèteComplexe
#
# ============================================================
# DEVELOPMENT PROFILE
# ============================================================

# --- Database Configuration (PostgreSQL, DRY via .env) ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:medicalsplants_dev}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA - Show SQL in development
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Logging - Verbose in development
logging.level.root=DEBUG
logging.level.com.medicalsplants=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================================
# EMAIL - SMTP
# ============================================================
spring.mail.host=${MAIL_HOST:smtp.example.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:ton_email@example.com}
spring.mail.password=${MAIL_PASSWORD:ton_mot_de_passe}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator - show health details in dev for debugging
management.endpoints.web.exposure.include=health,info,metrics,beans
management.endpoint.health.show-details=always
# In dev we disable the mail health check if no SMTP server is running locally
management.health.mail.enabled=false