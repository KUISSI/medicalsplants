# ============================================================
# JWT CONFIGURATION
# ============================================================
app.jwt.secret=${JWT_SECRET:myDevSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong123456789}
app.jwt.expiration=${JWT_EXPIRATION:900000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
app.jwt.token-prefix=Bearer 
app.jwt.header-name=Authorization
# ============================================================
# DEVELOPMENT PROFILE
# ============================================================

# --- Database Configuration (PostgreSQL via Docker) ---
# Run: docker-compose -f docker-compose.dev.yml up -d db
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:medicalsplants_dev}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA - Show SQL in development
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Logging - Verbose in development
logging.level.root=INFO
logging.level.com.medicalsplants=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.flywaydb=DEBUG

# ============================================================
# CORS CONFIGURATION
# ============================================================
app.cors.allowed-origins=http://localhost:4200,http://localhost:4201

# ============================================================
# EMAIL - SMTP
# ============================================================
spring.mail.host=${MAIL_HOST:smtp.example.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:ton_email@example.com}
spring.mail.password=${MAIL_PASSWORD:ton_mot_de_passe}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator - show health details in dev for debugging
management.endpoints.web.exposure.include=health,info,metrics,beans
management.endpoint.health.show-details=always
# In dev we disable the mail health check if no SMTP server is running locally
management.health.mail.enabled=false