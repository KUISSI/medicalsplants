# JPA - Show SQL in development
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Logging - Verbose in development
logging.level.com.medicalsplants=DEBUG
logging. level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================================
# EMAIL - SMTP
# ============================================================
spring.mail.host=${MAIL_HOST:smtp.example.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:ton_email@example.com}
spring.mail.password=${MAIL_PASSWORD:ton_mot_de_passe}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true