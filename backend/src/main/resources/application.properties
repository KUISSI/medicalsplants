# ============================================================
# APPLICATION PROPERTIES - MEDICALS PLANTS API
# ============================================================

# Application
spring.application.name=medicalsplants-api

# Profiles
spring.profiles.active=${env.SPRING_PROFILES_ACTIVE:dev}

# Server
server.port=${env.SERVER_PORT:8080}

# Database
spring.datasource.url=jdbc:postgresql://${env.DB_HOST:localhost}:${env.DB_PORT:5432}/${env.DB_NAME:medicalsplants_dev}
spring.datasource.username=${env.DB_USERNAME:postgres}
spring.datasource.password=${env.DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Email
spring.mail.host=${env.MAIL_HOST:localhost}
spring.mail.port=${env.MAIL_PORT:1025}
spring.mail.username=${env.MAIL_USERNAME:}
spring.mail.password=${env.MAIL_PASSWORD:}

# Custom Properties
app.name=${env.APP_NAME:Medicals Plants}
app.jwt.secret=${env.JWT_SECRET:default-dev-secret-key-change-in-production-256-bits}
app.jwt.expiration=${env.JWT_EXPIRATION:900000}
app.jwt.refresh-expiration=${env.JWT_REFRESH_EXPIRATION:604800000}
app.cors.allowed-origins=${env.CORS_ORIGINS:http://localhost:4200,http://localhost:4201}

# Actuator
management.endpoints.web.exposure.include=health,info

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.root=INFO
logging.level.com.medicalsplants=DEBUG
logging.level.org.hibernate.SQL=DEBUG
